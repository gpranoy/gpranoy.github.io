function pgCopyItem(event, el) {
  event.preventDefault();
  var text = el.dataset.copy;
  if (!text) return;
  navigator.clipboard.writeText(text).then(function() {
    var orig = el.dataset.tooltip;
    el.dataset.tooltip = 'Copied: ' + text;
    el.classList.add('copied');
    setTimeout(function() { el.dataset.tooltip = orig; el.classList.remove('copied'); }, 2200);
  });
}
</script>
<script>
(function () {
  var ranges = [
    [0x1F000, 0x1FFFF], [0x2600, 0x27BF], [0x2300, 0x23FF],
    [0x1F300, 0x1F9FF], [0x1FA00, 0x1FAFF], [0x1F100, 0x1F1FF]
  ];
  function isEmoji(cp) {
    return ranges.some(function(r) { return cp >= r[0] && cp <= r[1]; });
  }
  function stripEmoji(str) {
    var out = [];
    for (var i = 0; i < str.length; i++) {
      var cp = str.codePointAt(i);
      if (cp > 0xFFFF) i++;
      if (!isEmoji(cp)) out.push(String.fromCodePoint(cp));
    }
    return out.join('');
  }
  function walk(node) {
    if (node.nodeType === 3) {
      var cleaned = stripEmoji(node.textContent);
      if (cleaned !== node.textContent) node.textContent = cleaned;
    } else {
      node.childNodes.forEach(walk);
    }
  }
  document.addEventListener('DOMContentLoaded', function () { walk(document.body); });
})();
</script>
